<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

<div class="contact-box">

    <h2>Contact Us</h2>

    <form>

        <label>Name</label>

        <input type="text"
               placeholder="Enter your name">

        <label>Email</label>

        <input type="email"
               placeholder="Enter your email">

        <label>Message</label>

        <textarea
            placeholder="Type your message">
        </textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

</div>

</body>
</html>

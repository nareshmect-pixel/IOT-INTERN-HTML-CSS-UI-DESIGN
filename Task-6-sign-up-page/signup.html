<!DOCTYPE html>
<html>
<head>
    <title>Signup Page</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

<div class="signup-box">

    <h2>Signup</h2>

    <form>

        <input type="text"
               placeholder="Enter Username">

        <input type="email"
               placeholder="Enter Email">

        <input type="password"
               placeholder="Enter Password">
        <input type="password"
               placeholder="Confirm Password">
        <button type="submit">
            Signup
        </button>

    </form>

</div>

</body>




</html>

<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<header>
    <h1>Admin Dashboard</h1>
</header>

<div class="dashboard">

    <div class="card">
        <h2>Users</h2>
        <p>120</p>
    </div>

    <div class="card">
        <h2>Orders</h2>
        <p>45</p>
    </div>

    <div class="card">
        <h2>Revenue</h2>
        <p>₹25,000</p>
    </div>

</div>

<div class="activity">

    <h2>Recent Activity</h2>

    <ul>
        <li>User Registered</li>
        <li>New Order Received</li>
        <li>Payment Completed</li>
    </ul>

</div>

</body>
</html>
